global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'eureka-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['eureka-server:8761']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8083']

  - job_name: 'orders-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['orders-service:8080']

  - job_name: 'product-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['product-service:8081']

  - job_name: 'payments-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['payments-service:8082']

  - job_name: 'credit-card-processor-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['credit-card-processor-service:8084']

  # MongoDB performance metrics via percona/mongodb_exporter
  - job_name: 'mongodb'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['mongodb-exporter:9216']
