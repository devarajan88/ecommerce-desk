services:

  # =========================
  # INFRA SERVICES
  # =========================

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: niruthendb
      MYSQL_ROOT_PASSWORD: admin123
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-padmin123" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    command: start-dev --http-port 8080
    ports:
      - "9091:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/realms/master" ]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: always

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      CONFIG_SERVER_PASSWORD: configsecret
      # JWT_SECRET is resolved by config-server when serving user-service.properties
      JWT_SECRET: your-very-secure-secret-key-with-minimum-256-bits-length-for-production
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: always

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:9411/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  # =========================
  # MONGODB (payments + orders history)
  # =========================

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: mongosecret
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok", "--username", "mongoadmin", "--password", "mongosecret", "--authenticationDatabase", "admin" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  # Exports MongoDB metrics to Prometheus (connect_string uses admin credentials)
  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    container_name: mongodb-exporter
    ports:
      - "9216:9216"
    command:
      - "--mongodb.uri=mongodb://mongoadmin:mongosecret@mongodb:27017/admin?authSource=admin"
      - "--collect-all"
      - "--compatible-mode"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: always

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: always

  # =========================
  # CODE QUALITY (SONARQUBE)
  # =========================

  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar123
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sonar -d sonarqube" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar123
      # Disable Elasticsearch bootstrap checks for local Docker environments.
      # On Linux hosts set: sysctl -w vm.max_map_count=524288 && sysctl -w fs.file-max=131072
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      sonarqube-db:
        condition: service_healthy
    restart: always

  # =========================
  # KAFKA (SINGLE BROKER - STABLE DEV SETUP)
  # =========================

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo > /dev/tcp/localhost/9092" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  # =========================
  # MICROSERVICES
  # =========================

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_SERVER_URL: http://config-server:8888
      CONFIG_SERVER_PASSWORD: configsecret
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/niruthendb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATA_REDIS_HOST: redis
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/saga-realm
      KEYCLOAK_CLIENT_SECRET: K0Jn9c07SrKuldVWp6QXtCOs47iZSmHY
    depends_on:
      mysql:
        condition: service_started
      eureka-server:
        condition: service_started
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
      zipkin:
        condition: service_started
      redis:
        condition: service_started
      config-server:
        condition: service_healthy
    restart: always

  orders-service:
    build: ./orders-service
    container_name: orders-service
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_SERVER_URL: http://config-server:8888
      CONFIG_SERVER_PASSWORD: configsecret
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/niruthendb?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_MONGODB_URI: mongodb://mongoadmin:mongosecret@mongodb:27017/ordersdb?authSource=admin
    depends_on:
      mysql:
        condition: service_started
      mongodb:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_started
      zipkin:
        condition: service_started
      redis:
        condition: service_started
      config-server:
        condition: service_healthy
    restart: always

  product-service:
    build: ./products-service
    container_name: product-service
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_SERVER_URL: http://config-server:8888
      CONFIG_SERVER_PASSWORD: configsecret
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/niruthendb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_started
      eureka-server:
        condition: service_started
      kafka:
        condition: service_started
      zipkin:
        condition: service_started
      redis:
        condition: service_started
      config-server:
        condition: service_healthy
    restart: always

  payments-service:
    build: ./payments-service
    container_name: payments-service
    ports:
      - "8084:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_SERVER_URL: http://config-server:8888
      CONFIG_SERVER_PASSWORD: configsecret
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REMOTE_CCP_URL: http://credit-card-processor-service:8080
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_MONGODB_URI: mongodb://mongoadmin:mongosecret@mongodb:27017/paymentsdb?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_started
      zipkin:
        condition: service_started
      redis:
        condition: service_started
      config-server:
        condition: service_healthy
    restart: always

  credit-card-processor-service:
    build: ./credit-card-processor-service
    container_name: credit-card-processor-service
    ports:
      - "8085:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod          # Fix #7
      CONFIG_SERVER_URL: http://config-server:8888
      CONFIG_SERVER_PASSWORD: configsecret  # Fix #4
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started
      redis:
        condition: service_started
      config-server:
        condition: service_healthy
    restart: always

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod          # Fix #7
      CONFIG_SERVER_URL: http://config-server:8888
      CONFIG_SERVER_PASSWORD: configsecret  # Fix #4
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      # Fix #2: explicit issuer URI so JWT validation is correct in every environment
      JWT_ISSUER_URI: http://keycloak:8080/realms/saga-realm
      JWT_JWK_SET_URI: http://keycloak:8080/realms/saga-realm/protocol/openid-connect/certs
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      eureka-server:
        condition: service_started
      keycloak:
        condition: service_started
      zipkin:
        condition: service_started
      redis:
        condition: service_started
      config-server:
        condition: service_healthy
    restart: always

volumes:
  mysql_data:
  mongodb_data:
  keycloak_data:
  redis_data:
  prometheus_data:
  grafana_data:
  kafka_data:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
