spring.application.name=eureka-server
server.port=8761

# Eureka Server — must be local so this service can start before config-server
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.server.enable-self-preservation=false
eureka.server.eviction-interval-timer-in-ms=5000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.export.prometheus.enabled=true

# Config Server import is optional; any values above act as safe fallbacks
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
spring.cloud.config.username=configuser
spring.cloud.config.password=${CONFIG_SERVER_PASSWORD:configsecret}
