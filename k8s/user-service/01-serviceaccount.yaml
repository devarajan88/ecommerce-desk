# ServiceAccount with IRSA (IAM Roles for Service Accounts).
# The eks.amazonaws.com/role-arn annotation binds this pod's identity to an
# AWS IAM role — used if user-service needs to access S3, SQS, Secrets Manager, etc.
# Replace <AWS_ACCOUNT_ID> with your 12-digit account ID before applying.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service
  namespace: saga
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/user-service-eks-role
  labels:
    app: user-service
    app.kubernetes.io/part-of: saga-platform