# Sensitive credentials. Values use stringData (plain text) — kubectl encodes to base64 on apply.
#
# PRODUCTION RECOMMENDATION:
#   Do NOT commit this file with real values to git.
#   Instead, use one of:
#     (a) AWS Secrets Manager + External Secrets Operator (ESO) — recommended for EKS
#     (b) AWS Systems Manager Parameter Store + ESO
#     (c) Sealed Secrets (Bitnami) — encrypts values safe to commit
#     (d) SOPS + Helm secrets — GitOps-friendly
#
# For local/staging use, fill in values below and apply manually:
#   kubectl apply -f 03-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
  namespace: saga
  labels:
    app: user-service
    app.kubernetes.io/part-of: saga-platform
type: Opaque
stringData:
  # Config Server HTTP Basic password (matches CONFIG_SERVER_PASSWORD in config-server deployment)
  CONFIG_SERVER_PASSWORD: "configsecret"

  # MySQL credentials — use RDS master password or a dedicated app user (not root in production)
  SPRING_DATASOURCE_PASSWORD: "admin123"

  # Keycloak client secret for saga-client (used by AuthController for ROPC login flow)
  KEYCLOAK_CLIENT_SECRET: "K0Jn9c07SrKuldVWp6QXtCOs47iZSmHY"

  # Keycloak admin password (used by KeycloakAdminService to provision users via Admin REST API)
  KEYCLOAK_ADMIN_PASSWORD: "admin"

  # JWT signing secret (used by user-service for any local JWT operations)
  JWT_SECRET: "your-very-secure-secret-key-with-minimum-256-bits-length-for-production"