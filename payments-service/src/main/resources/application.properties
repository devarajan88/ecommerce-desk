spring.application.name=payments-service
# Config Server connection — credentials needed before config can be fetched
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
spring.cloud.config.username=configuser
spring.cloud.config.password=${CONFIG_SERVER_PASSWORD:configsecret}

# MongoDB — payments-service stores payment records as documents (no relational joins needed)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/paymentsdb}
spring.data.mongodb.auto-index-creation=true