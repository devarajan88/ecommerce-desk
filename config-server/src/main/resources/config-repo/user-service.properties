server.port=8083

# Database — local dev defaults.
# In Docker / production, SPRING_DATASOURCE_URL env var overrides this automatically.
spring.datasource.url=jdbc:mysql://localhost:3306/niruthendb
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# JWT secret — override via JWT_SECRET env var in Docker / production
jwt.secret=${JWT_SECRET:your-very-secure-secret-key-with-minimum-256-bits-length-for-production}