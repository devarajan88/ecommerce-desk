server.port=8080

# Database — local dev defaults.
# In Docker / production, SPRING_DATASOURCE_URL env var overrides this automatically.
spring.datasource.url=jdbc:mysql://localhost:3306/ordersdb
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# Kafka Consumer
spring.kafka.consumer.group-id=orders-ms
spring.kafka.consumer.properties.spring.json.trusted.packages=com.appsdeveloperblog.core.*,com.appsdeveloperblog.core.dto.events,com.appsdeveloperblog.core.dto.commands

# Topic Names
orders.events.topic.name=orders-events
products.commands.topic.name=products-commands
products.events.topic.name=products-events
payments.commands.topic.name=payments-commands
payments.events.topic.name=payments-events
orders.commands.topic.name=orders-commands