# ===============================
# Prod profile overrides — activated via SPRING_PROFILES_ACTIVE=prod in docker-compose / k8s
# Explicitly hardens the defaults from application.properties.
# ===============================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.root=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Tracing: sample only 10% of requests in production to reduce Zipkin overhead
management.tracing.sampling.probability=0.1