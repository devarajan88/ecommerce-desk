server.port=8081

# Database — local dev defaults.
# In Docker / production, SPRING_DATASOURCE_URL env var overrides this automatically.
spring.datasource.url=jdbc:mysql://localhost:3306/niruthendb
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# Kafka — disable auto topic creation
spring.kafka.admin.auto-create=false
spring.kafka.producer.properties.allow.auto.create.topics=false
spring.kafka.consumer.group-id=products-ms
spring.kafka.consumer.properties.spring.json.trusted.packages=com.appsdeveloperblog.core.*,com.appsdeveloperblog.core.dto.events,com.appsdeveloperblog.core.dto.commands
spring.kafka.consumer.properties.allow.auto.create.topics=false

# Topic Names
products.commands.topic.name=products-commands
products.events.topic.name=products-events