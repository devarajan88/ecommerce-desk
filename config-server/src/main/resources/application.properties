spring.application.name=config-server
server.port=8888

# Native filesystem backend — configs live in classpath:/config-repo (bundled in jar)
spring.profiles.active=native
spring.cloud.config.server.native.search-locations=classpath:/config-repo

# Eureka registration so clients can discover the config server by name
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Fix #4: HTTP Basic auth — clients must supply these credentials to fetch config.
# Set CONFIG_SERVER_PASSWORD in docker-compose / Kubernetes secrets. Never commit the real value.
spring.security.user.name=configuser
spring.security.user.password=${CONFIG_SERVER_PASSWORD:configsecret}

# Actuator health endpoint is kept public so docker-compose healthcheck works without credentials
management.endpoints.web.exposure.include=health,info,refresh
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
