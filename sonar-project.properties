# =============================================================================
# SonarQube project properties
# Used by: sonar-scanner CLI  (alternative to mvn sonar:sonar)
# Maven analysis via sonar-maven-plugin reads these automatically.
# =============================================================================

# ----- Root / aggregator -----
sonar.projectKey=saga-pattern-spring-boot-demo
sonar.projectName=Saga Pattern Spring Boot Demo
sonar.projectVersion=1.0.0

sonar.host.url=http://localhost:9000
# Pass token at runtime — never commit a real token here:
#   sonar-scanner -Dsonar.token=<TOKEN>
#   mvn sonar:sonar  -Dsonar.token=<TOKEN>

sonar.sourceEncoding=UTF-8
sonar.language=java

# ----- Multi-module layout -----
# Each entry maps to a sub-module directory.
sonar.modules=orders-service,products-service,payments-service,credit-card-processor-service,user-service,api-gateway,eureka-server

# ---- orders-service ----
orders-service.sonar.projectName=Orders Service
orders-service.sonar.projectBaseDir=orders-service
orders-service.sonar.sources=src/main/java
orders-service.sonar.tests=src/test/java
orders-service.sonar.java.binaries=target/classes
orders-service.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
orders-service.sonar.exclusions=**/generated-sources/**,**/*Application.java

# ---- products-service ----
products-service.sonar.projectName=Products Service
products-service.sonar.projectBaseDir=products-service
